name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允許建立 Release 和上傳檔案

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: mbstring, xml

      - name: Install Composer dependencies (production only)
        run: composer install --no-dev --optimize-autoloader

      - name: Create plugin zip
        run: |
          mkdir -p release

          # 使用 rsync 排除不需要的目錄
          rsync -av --exclude='release' --exclude='.git' --exclude='.github' . release/buygo-plus-one/

          # 進入目錄清理開發檔案
          cd release/buygo-plus-one

          # 刪除開發目錄（保留 design-system，這是生產環境需要的）
          rm -rf .planning .claude .vscode .idea
          rm -rf node_modules vendor tests bin
          rm -rf liff test-scripts docs uploads

          # 刪除 .md 檔案 (保留 README.md)
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec rm -f {} \;

          # 刪除開發腳本
          find . -maxdepth 1 \( -name "test-*.php" -o -name "check-*.php" -o -name "debug-*.php" -o -name "verify-*.php" -o -name "simple-*.php" \) -exec rm -f {} \;

          # 刪除建置工具
          rm -f build-release.sh release.sh composer.json composer.lock
          rm -f phpunit.xml phpunit-unit.xml phpunit.xml.dist .phpunit.result.cache
          rm -f .zipignore .gitignore

          # 刪除 .DS_Store
          find . -name ".DS_Store" -exec rm -f {} \;

          # 刪除特定開發檔案
          rm -f includes/admin/check-compare-price.php
          rm -f includes/CLAUDE.md

          # 修改外掛名稱為正式版
          sed -i 's/Plugin Name:       BuyGo 開發版/Plugin Name:       BuyGo+1/' buygo-plus-one.php

          # 建立 ZIP
          cd ..
          zip -r buygo-plus-one-${{ steps.get_version.outputs.VERSION }}.zip buygo-plus-one/

          # 計算檔案大小和 SHA256
          FILE_SIZE=$(du -h "buygo-plus-one-${{ steps.get_version.outputs.VERSION }}.zip" | cut -f1)
          FILE_SHA256=$(sha256sum "buygo-plus-one-${{ steps.get_version.outputs.VERSION }}.zip" | cut -d' ' -f1)
          echo "FILE_SIZE=$FILE_SIZE" >> $GITHUB_ENV
          echo "FILE_SHA256=$FILE_SHA256" >> $GITHUB_ENV
          echo "Package size: $FILE_SIZE"
          echo "SHA256: $FILE_SHA256"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: BuyGo+1 v${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          body: |
            ## BuyGo+1 v${{ steps.get_version.outputs.VERSION }}

            ### 更新內容
            請查看 CHANGELOG.md 了解詳細更新內容。

            ### 安裝方法
            1. 下載 `buygo-plus-one-${{ steps.get_version.outputs.VERSION }}.zip`
            2. 在 WordPress 後台上傳並啟用外掛
            3. 確保已安裝並啟用 `buygo-line-notify` 外掛

            ### 自動更新
            此版本支援自動更新，安裝後會在有新版本時自動提示更新。

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release/buygo-plus-one-${{ steps.get_version.outputs.VERSION }}.zip
          asset_name: buygo-plus-one-${{ steps.get_version.outputs.VERSION }}.zip
          asset_content_type: application/zip

      - name: Notify Cloudflare Workers Update API
        if: success()
        run: |
          # 通知 Cloudflare Workers 更新 API 有新版本
          curl -X POST "${{ secrets.CLOUDFLARE_WORKER_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Update-Token: ${{ secrets.CLOUDFLARE_UPDATE_TOKEN }}" \
            -d '{
              "plugin": "buygo-plus-one",
              "version": "${{ steps.get_version.outputs.VERSION }}",
              "download_url": "https://github.com/fishtvlvoe/buygo-plus-one/releases/download/v${{ steps.get_version.outputs.VERSION }}/buygo-plus-one-${{ steps.get_version.outputs.VERSION }}.zip",
              "sha256": "${{ env.FILE_SHA256 }}",
              "size": "${{ env.FILE_SIZE }}",
              "tested": "6.4",
              "requires": "5.8",
              "requires_php": "7.4"
            }' || echo "⚠️ Cloudflare Workers webhook 失敗（不影響發布）"
