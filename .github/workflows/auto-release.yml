name: Auto Tag & Release

on:
  push:
    branches:
      - main

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    # 跳過 auto-release 自己打的 tag push（避免重複觸發）
    if: |
      !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 讀取版本號
        id: version
        run: |
          VERSION=$(grep -m1 '^\s*\*\s*Version:' buygo-plus-one.php | sed 's/.*Version:[[:space:]]*//')
          echo "版本號：$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 檢查 tag 是否已存在
        id: check_tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} 已存在，跳過"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag v${VERSION} 不存在，準備建立"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: 產生 Changelog
        if: steps.check_tag.outputs.exists == 'false'
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi
          if [ -z "$COMMITS" ]; then
            COMMITS="- 版本更新"
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 打 Tag 並 Push
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ steps.version.outputs.version }}"
          git tag "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      # tag push 會觸發 release.yml，自動打包 ZIP + 建 Release
