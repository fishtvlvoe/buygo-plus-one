name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: git diff origin/${{ github.base_ref }}...HEAD > pr.diff

      - name: AI Code Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, subprocess

          diff = open("pr.diff").read()[:12000]
          if not diff.strip():
              print("No diff found, skipping review.")
              exit(0)

          payload = {
              "model": "claude-sonnet-4-6",
              "max_tokens": 1500,
              "messages": [{
                  "role": "user",
                  "content": f"""You are a senior WordPress plugin code reviewer. Review this PR diff.
Focus only on real bugs, security issues, and critical quality problems. Be concise.
If no issues, say so clearly. Use Traditional Chinese for the review.

```diff
{diff}
```"""
              }]
          }

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(payload).encode(),
              headers={
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              }
          )
          resp = json.loads(urllib.request.urlopen(req).read())
          review = resp["content"][0]["text"]

          comment = f"""### AI Code Review

{review}

---
🤖 Generated with Claude Code"""

          pr = os.environ["PR_NUMBER"]
          repo = os.environ["REPO"]
          subprocess.run(["gh", "pr", "comment", pr, "--repo", repo, "--body", comment], check=True)
          PYEOF
